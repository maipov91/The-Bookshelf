  <rect x="149" y="105" width="16" height="43" rx="2" fill="#E2D6BB"/>
  <rect x="149" y="105" width="4" height="43" rx="1" fill="#c8bfa5"/>
  <rect x="151" y="115" width="9" height="2" rx="1" fill="#3C5A5A" opacity="0.3"/>
  <rect x="151" y="120" width="7" height="2" rx="1" fill="#3C5A5A" opacity="0.3"/>

  <!-- Cabinet legs -->
  <rect x="35" y="178" width="16" height="12" rx="3" fill="#2d4444"/>
  <rect x="149" y="178" width="16" height="12" rx="3" fill="#2d4444"/>

  <!-- Bottom base -->
  <rect x="20" y="175" width="160" height="8" rx="3" fill="#3C5A5A"/>

  <!-- Top crown -->
  <rect x="16" y="26" width="168" height="10" rx="4" fill="#3C5A5A"/>
  <rect x="20" y="22" width="160" height="10" rx="3" fill="#4a6e6e"/>

  <!-- Small decorative knobs -->
  <circle cx="97" cy="120" r="4" fill="#D99450"/>
  <circle cx="97" cy="120" r="2" fill="#933710"/>
  <circle cx="103" cy="120" r="4" fill="#D99450"/>
  <circle cx="103" cy="120" r="2" fill="#933710"/>
