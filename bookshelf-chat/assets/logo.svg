<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>The Bookshelf logo</title>

  <!-- Cabinet frame -->
  <rect x="20" y="30" width="160" height="150" rx="6" fill="#3C5A5A"/>

