  <rect x="28" y="38" width="144" height="134" rx="4" fill="#2d4444"/>

  <!-- Shelf 1 (top) -->
  <rect x="28" y="95" width="144" height="7" fill="#3C5A5A"/>

  <!-- Shelf 2 (bottom) -->
