  <rect x="117" y="120" width="11" height="2" rx="1" fill="#3C5A5A" opacity="0.4"/>
  <rect x="117" y="125" width="9" height="2" rx="1" fill="#3C5A5A" opacity="0.4"/>

  <!-- Book F: rust short -->
  <rect x="134" y="120" width="13" height="28" rx="2" fill="#933710"/>
  <rect x="134" y="120" width="3" height="28" rx="1" fill="#7a2d0d"/>

