  <rect x="38" y="58" width="12" height="2" rx="1" fill="#E2D6BB" opacity="0.5"/>
  <rect x="38" y="63" width="10" height="2" rx="1" fill="#E2D6BB" opacity="0.5"/>

  <!-- Book 2: khaki short -->
  <rect x="56" y="62" width="14" height="33" rx="2" fill="#9E9B63"/>
  <rect x="56" y="62" width="4" height="33" rx="1" fill="#7a7848"/>
