  <rect x="72" y="48" width="20" height="47" rx="2" fill="#D99450"/>
  <rect x="72" y="48" width="4" height="47" rx="1" fill="#b87840"/>
  <rect x="74" y="58" width="12" height="2" rx="1" fill="#3C5A5A" opacity="0.4"/>
  <rect x="74" y="63" width="10" height="2" rx="1" fill="#3C5A5A" opacity="0.4"/>
  <rect x="74" y="68" width="11" height="2" rx="1" fill="#3C5A5A" opacity="0.4"/>

  <!-- Book 4: beige medium -->
  <rect x="94" y="57" width="15" height="38" rx="2" fill="#E2D6BB"/>
  <rect x="94" y="57" width="4" height="38" rx="1" fill="#c8bfa5"/>
